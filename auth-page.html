<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ✅ SECURITY: Content Security Policy verhindert XSS -->
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co;">
<!-- ✅ SECURITY: Verhindert Clickjacking -->
<meta http-equiv="X-Frame-Options" content="DENY">
<!-- ✅ SECURITY: Verhindert MIME-Type Sniffing -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="no-referrer">
<title>SecureAuth — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:       #0a0c10;
    --surface:  #10141c;
    --border:   #1e2535;
    --accent:   #e8c547;
    --accent2:  #4de89a;
    --danger:   #e84d4d;
    --text:     #d4dae8;
    --muted:    #5a6480;
    --radius:   6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Animated grid background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(232,197,71,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,197,71,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    animation: floatGlow 8s ease-in-out infinite alternate;
  }
  .glow-1 { background: rgba(232,197,71,.07); top: -100px; left: -100px; }
  .glow-2 { background: rgba(77,232,154,.05); bottom: -100px; right: -100px; animation-delay: -4s; }

  @keyframes floatGlow {
    from { transform: translate(0,0); }
    to   { transform: translate(30px, 20px); }
  }

  /* ── Card ── */
  .card {
    position: relative; z-index: 1;
    width: min(420px, 96vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem 2rem;
    box-shadow: 0 0 0 1px rgba(232,197,71,.06), 0 32px 64px rgba(0,0,0,.5);
    animation: fadeUp .5s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Header ── */
  .logo {
    display: flex; align-items: center; gap: .6rem;
    margin-bottom: 1.8rem;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: grid; place-items: center;
  }
  .logo-icon svg { width: 18px; height: 18px; fill: var(--bg); }
  .logo-text { font-size: 1.1rem; font-weight: 800; letter-spacing: -.5px; }
  .logo-text span { color: var(--accent); }

  /* ── Tabs ── */
  .tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 2rem;
    border: 1px solid var(--border);
  }
  .tab {
    padding: .55rem;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: .78rem;
    cursor: pointer;
    border-radius: 4px;
    color: var(--muted);
    transition: all .25s;
    letter-spacing: .03em;
    user-select: none;
  }
  .tab.active {
    background: var(--surface);
    color: var(--accent);
    border: 1px solid rgba(232,197,71,.2);
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }

  /* ── Form ── */
  .form { display: none; flex-direction: column; gap: 1rem; }
  .form.visible { display: flex; animation: fadeIn .3s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .field { display: flex; flex-direction: column; gap: .4rem; }
  label {
    font-family: 'Space Mono', monospace;
    font-size: .72rem;
    color: var(--muted);
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: .88rem;
    padding: .75rem 1rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    width: 100%;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,197,71,.1);
  }
  input.invalid { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(232,77,77,.1); }
  input.valid   { border-color: var(--accent2); }

  /* ── Password strength ── */
  .strength-bar {
    height: 3px;
    border-radius: 2px;
    background: var(--border);
    overflow: hidden;
    margin-top: 4px;
  }
  .strength-fill {
    height: 100%;
    width: 0;
    border-radius: 2px;
    transition: width .4s, background .4s;
  }
  .strength-label {
    font-family: 'Space Mono', monospace;
    font-size: .68rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── Error / Success messages ── */
  .msg {
    font-family: 'Space Mono', monospace;
    font-size: .75rem;
    padding: .65rem .9rem;
    border-radius: var(--radius);
    display: none;
    border-left: 3px solid;
    animation: fadeIn .3s ease;
  }
  .msg.error   { background: rgba(232,77,77,.08);  border-color: var(--danger);  color: #f08080; display: block; }
  .msg.success { background: rgba(77,232,154,.08); border-color: var(--accent2); color: var(--accent2); display: block; }

  /* ── Button ── */
  .btn {
    margin-top: .5rem;
    padding: .85rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: .92rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .02em;
    transition: transform .15s, opacity .2s, box-shadow .2s;
    position: relative;
    overflow: hidden;
  }
  .btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(232,197,71,.25);
  }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .btn-spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,.3);
    border-top-color: var(--bg);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
  }
  .btn.loading .btn-text { opacity: 0; }
  .btn.loading .btn-spinner { display: block; }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* ── Footer ── */
  .footer {
    margin-top: 1.5rem;
    display: flex; align-items: center; gap: .5rem;
    font-family: 'Space Mono', monospace;
    font-size: .68rem;
    color: var(--muted);
  }
  .footer::before, .footer::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── Rate limit indicator ── */
  .rate-info {
    font-family: 'Space Mono', monospace;
    font-size: .68rem;
    color: var(--muted);
    text-align: right;
    margin-top: -.4rem;
  }

  /* ── CSRF badge ── */
  .csrf-badge {
    font-family: 'Space Mono', monospace;
    font-size: .62rem;
    color: var(--accent2);
    display: flex;
    align-items: center;
    gap: .3rem;
    margin-bottom: .5rem;
    opacity: .6;
  }
  .csrf-badge span { font-size: .55rem; background: rgba(77,232,154,.1); padding: 2px 6px; border-radius: 3px; border: 1px solid rgba(77,232,154,.2); }

  /* ── Password toggle ── */
  .input-wrap { position: relative; }
  .toggle-pw {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    cursor: pointer; color: var(--muted);
    font-size: .75rem; font-family: 'Space Mono', monospace;
    user-select: none;
    transition: color .2s;
  }
  .toggle-pw:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
    </div>
    <div class="logo-text">Secure<span>Auth</span></div>
  </div>

  <!-- CSRF token (in production: kommt vom Server) -->
  <div class="csrf-badge">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
    CSRF-Token: <span id="csrfDisplay">...</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')" id="tab-login">// login</div>
    <div class="tab" onclick="switchTab('register')" id="tab-register">// register</div>
  </div>

  <!-- ── LOGIN FORM ── -->
  <form id="loginForm" class="form visible" novalidate>
    <div class="msg" id="loginMsg"></div>

    <div class="field">
      <label for="loginEmail">E-Mail</label>
      <input type="email" id="loginEmail" placeholder="user@example.com"
             autocomplete="email" maxlength="254">
    </div>

    <div class="field">
      <label for="loginPass">Passwort</label>
      <div class="input-wrap">
        <input type="password" id="loginPass" placeholder="••••••••"
               autocomplete="current-password" maxlength="128">
        <span class="toggle-pw" onclick="togglePw('loginPass',this)">show</span>
      </div>
    </div>

    <div class="rate-info" id="loginRateInfo"></div>

    <button type="submit" class="btn" id="loginBtn">
      <span class="btn-text">Einloggen</span>
      <span class="btn-spinner"></span>
    </button>
  </form>

  <!-- ── REGISTER FORM ── -->
  <form id="registerForm" class="form" novalidate>
    <div class="msg" id="registerMsg"></div>

    <div class="field">
      <label for="regName">Benutzername</label>
      <input type="text" id="regName" placeholder="max_mustermann"
             autocomplete="username" maxlength="30" pattern="[a-z0-9_]{3,30}">
    </div>

    <div class="field">
      <label for="regEmail">E-Mail</label>
      <input type="email" id="regEmail" placeholder="user@example.com"
             autocomplete="email" maxlength="254">
    </div>

    <div class="field">
      <label for="regPass">Passwort</label>
      <div class="input-wrap">
        <input type="password" id="regPass" placeholder="Min. 12 Zeichen"
               autocomplete="new-password" maxlength="128">
        <span class="toggle-pw" onclick="togglePw('regPass',this)">show</span>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel">Gib ein Passwort ein</div>
    </div>

    <div class="field">
      <label for="regPassConfirm">Passwort wiederholen</label>
      <input type="password" id="regPassConfirm" placeholder="••••••••"
             autocomplete="new-password" maxlength="128">
    </div>

    <div class="rate-info" id="registerRateInfo"></div>

    <button type="submit" class="btn" id="registerBtn">
      <span class="btn-text">Konto erstellen</span>
      <span class="btn-spinner"></span>
    </button>
  </form>

  <div class="footer">secured</div>
</div>

<!-- ✅ Supabase SDK (Option 1: GitHub Pages) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════
//  KONFIGURATION
//  Option 1 (GitHub Pages): Supabase-Zugangsdaten hier eintragen
//  Option 2 (Eigener Server): API_URL auf deinen Server zeigen lassen
// ═══════════════════════════════════════════════════════════

const CONFIG = {
  // ── Option 1: Supabase ──────────────────────────────────
  SUPABASE_URL:  'https://ooetpiwjoxqxsfqakxdj.supabase.co',  
  SUPABASE_ANON: 'sb_publishable_qLtcRuwW2J9021KordIHeQ_GREMnx_H',                     

  // ── Option 2: Eigener Backend-Server ───────────────────
  API_URL: 'https://api.deindomain.de',                // ← ersetzen

  USE_SUPABASE: true, 
};

// ═══════════════════════════════════════════════════════════
//  ✅ SECURITY: CSRF-Token Generator
//  Generiert einen kryptografisch sicheren Token
// ═══════════════════════════════════════════════════════════

function generateCSRFToken() {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
}

const CSRF_TOKEN = generateCSRFToken();
sessionStorage.setItem('csrf_token', CSRF_TOKEN);
document.getElementById('csrfDisplay').textContent =
  CSRF_TOKEN.slice(0,8) + '…' + CSRF_TOKEN.slice(-4);

// ═══════════════════════════════════════════════════════════
//  ✅ SECURITY: Rate Limiting (Client-Side Demo)
//  In Produktion IMMER auch serverseitig implementieren!
// ═══════════════════════════════════════════════════════════

const rateLimiter = {
  attempts: {},
  MAX_ATTEMPTS: 5,
  WINDOW_MS: 15 * 60 * 1000,   // 15 Minuten

  check(action) {
    const now = Date.now();
    const key = action;
    if (!this.attempts[key]) this.attempts[key] = [];

    // Alte Versuche rausfiltern
    this.attempts[key] = this.attempts[key].filter(t => now - t < this.WINDOW_MS);

    if (this.attempts[key].length >= this.MAX_ATTEMPTS) {
      const wait = Math.ceil((this.WINDOW_MS - (now - this.attempts[key][0])) / 60000);
      return { allowed: false, message: `Zu viele Versuche. Warte ${wait} Min.` };
    }
    return { allowed: true, remaining: this.MAX_ATTEMPTS - this.attempts[key].length };
  },

  record(action) {
    if (!this.attempts[action]) this.attempts[action] = [];
    this.attempts[action].push(Date.now());
  }
};

// ═══════════════════════════════════════════════════════════
//  ✅ SECURITY: Input Sanitization & Validation
// ═══════════════════════════════════════════════════════════

const validate = {
  // ✅ XSS-Schutz: HTML-Tags entfernen/escapen
  sanitize(str) {
    const el = document.createElement('div');
    el.textContent = str;         // .textContent escapet automatisch
    return el.innerHTML.trim();
  },

  email(val) {
    if (!val) return 'E-Mail ist erforderlich';
    const safe = this.sanitize(val);
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(safe)) return 'Ungültige E-Mail';
    if (safe.length > 254) return 'E-Mail zu lang';
    return null;
  },

  username(val) {
    if (!val) return 'Benutzername ist erforderlich';
    const safe = this.sanitize(val);
    if (!/^[a-z0-9_]{3,30}$/.test(safe))
      return 'Nur Kleinbuchstaben, Zahlen, _ — 3–30 Zeichen';
    return null;
  },

  // ✅ Passwort-Policy: min. 12 Zeichen, Groß/Klein/Zahl/Sonderzeichen
  password(val) {
    if (!val) return 'Passwort ist erforderlich';
    if (val.length < 12) return 'Mindestens 12 Zeichen';
    if (!/[A-Z]/.test(val)) return 'Mindestens ein Großbuchstabe';
    if (!/[a-z]/.test(val)) return 'Mindestens ein Kleinbuchstabe';
    if (!/[0-9]/.test(val)) return 'Mindestens eine Zahl';
    if (!/[^A-Za-z0-9]/.test(val)) return 'Mindestens ein Sonderzeichen';
    return null;
  }
};

// ═══════════════════════════════════════════════════════════
//  Passwort-Stärke Anzeige
// ═══════════════════════════════════════════════════════════

document.getElementById('regPass').addEventListener('input', function() {
  const pw = this.value;
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const fill   = document.getElementById('strengthFill');
  const label  = document.getElementById('strengthLabel');
  const colors = ['#e84d4d','#e87b4d','#e8c547','#a0e84d','#4de89a'];
  const labels = ['Sehr schwach','Schwach','Mittel','Stark','Sehr stark'];

  fill.style.width      = `${score * 20}%`;
  fill.style.background = colors[score - 1] || '#1e2535';
  label.textContent     = score ? labels[score - 1] : 'Gib ein Passwort ein';
  label.style.color     = colors[score - 1] || 'var(--muted)';
});

// ═══════════════════════════════════════════════════════════
//  UI Hilfsfunktionen
// ═══════════════════════════════════════════════════════════

function setLoading(btnId, state) {
  document.getElementById(btnId).classList.toggle('loading', state);
  document.getElementById(btnId).disabled = state;
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className   = 'msg ' + type;
}

function switchTab(tab) {
  ['login','register'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`${t}Form`).classList.toggle('visible', t === tab);
  });
}

function togglePw(inputId, btn) {
  const el = document.getElementById(inputId);
  const show = el.type === 'password';
  el.type = show ? 'text' : 'password';
  btn.textContent = show ? 'hide' : 'show';
}

// ═══════════════════════════════════════════════════════════
//  Supabase Client initialisieren (Option 1)
// ═══════════════════════════════════════════════════════════

let supabase = null;
if (CONFIG.USE_SUPABASE && window.supabase) {
  supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON);
}

// ═══════════════════════════════════════════════════════════
//  Login Handler
// ═══════════════════════════════════════════════════════════

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('loginEmail').value;
  const pass  = document.getElementById('loginPass').value;

  // ✅ Rate Limit prüfen
  const rl = rateLimiter.check('login');
  if (!rl.allowed) {
    showMsg('loginMsg', rl.message, 'error');
    return;
  }

  // ✅ Validierung
  const emailErr = validate.email(email);
  if (emailErr) { showMsg('loginMsg', emailErr, 'error'); return; }
  if (!pass)    { showMsg('loginMsg', 'Passwort ist erforderlich', 'error'); return; }

  setLoading('loginBtn', true);
  rateLimiter.record('login');

  try {
    if (CONFIG.USE_SUPABASE && supabase) {
      // ── Option 1: Supabase Auth ─────────────────────────
      const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
      if (error) throw new Error(error.message);
      showMsg('loginMsg', `✓ Willkommen zurück, ${data.user.email}!`, 'success');

    } else {
      // ── Option 2: Eigener Server ───────────────────────
      const res = await fetch(`${CONFIG.API_URL}/auth/login`, {
        method: 'POST',
        credentials: 'include',                      // ✅ Cookies senden
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-Token': sessionStorage.getItem('csrf_token'),  // ✅ CSRF
        },
        body: JSON.stringify({
          email:      validate.sanitize(email),
          password:   pass,
          csrf_token: CSRF_TOKEN,
        }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || 'Login fehlgeschlagen');
      }
      const data = await res.json();
      // ✅ JWT Token im httpOnly Cookie (kommt vom Server) — NICHT in localStorage!
      showMsg('loginMsg', `✓ Eingeloggt als ${data.user.email}`, 'success');
    }

  } catch (err) {
    // ✅ Keine detaillierten Fehler nach außen geben (kein "User not found" vs "Wrong pw")
    showMsg('loginMsg', 'Ungültige Zugangsdaten.', 'error');
    console.error('[Auth]', err.message);
  } finally {
    setLoading('loginBtn', false);
    document.getElementById('loginRateInfo').textContent =
      `${rateLimiter.check('login').remaining ?? 0} Versuche verbleibend`;
  }
});

// ═══════════════════════════════════════════════════════════
//  Register Handler
// ═══════════════════════════════════════════════════════════

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const name    = document.getElementById('regName').value;
  const email   = document.getElementById('regEmail').value;
  const pass    = document.getElementById('regPass').value;
  const confirm = document.getElementById('regPassConfirm').value;

  // ✅ Rate Limit
  const rl = rateLimiter.check('register');
  if (!rl.allowed) { showMsg('registerMsg', rl.message, 'error'); return; }

  // ✅ Validierung
  const nameErr  = validate.username(name);
  const emailErr = validate.email(email);
  const passErr  = validate.password(pass);
  if (nameErr)  { showMsg('registerMsg', nameErr, 'error'); return; }
  if (emailErr) { showMsg('registerMsg', emailErr, 'error'); return; }
  if (passErr)  { showMsg('registerMsg', passErr, 'error'); return; }
  if (pass !== confirm) { showMsg('registerMsg', 'Passwörter stimmen nicht überein', 'error'); return; }

  setLoading('registerBtn', true);
  rateLimiter.record('register');

  try {
    if (CONFIG.USE_SUPABASE && supabase) {
      // ── Option 1: Supabase ──────────────────────────────
      const { data, error } = await supabase.auth.signUp({
        email, password: pass,
        options: { data: { username: validate.sanitize(name) } }
      });
      if (error) throw new Error(error.message);
      showMsg('registerMsg', '✓ Konto erstellt! Bitte E-Mail bestätigen.', 'success');

    } else {
      // ── Option 2: Eigener Server ───────────────────────
      const res = await fetch(`${CONFIG.API_URL}/auth/register`, {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-Token': sessionStorage.getItem('csrf_token'),
        },
        body: JSON.stringify({
          username: validate.sanitize(name),
          email:    validate.sanitize(email),
          password: pass,   // ✅ Server hasht mit bcrypt (min cost 12)
          csrf_token: CSRF_TOKEN,
        }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || 'Registrierung fehlgeschlagen');
      }
      showMsg('registerMsg', '✓ Konto erstellt! Bitte E-Mail bestätigen.', 'success');
    }

  } catch (err) {
    showMsg('registerMsg', err.message || 'Fehler bei der Registrierung', 'error');
  } finally {
    setLoading('registerBtn', false);
  }
});
</script>
</body>
</html>
