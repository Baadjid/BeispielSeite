<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<title>SecureAuth — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #10141c; --border: #1e2535;
    --accent: #e8c547; --accent2: #4de89a; --danger: #e84d4d;
    --text: #d4dae8; --muted: #5a6480; --radius: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(232,197,71,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,197,71,.04) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .glow { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; animation: floatGlow 8s ease-in-out infinite alternate; }
  .glow-1 { background: rgba(232,197,71,.07); top: -100px; left: -100px; }
  .glow-2 { background: rgba(77,232,154,.05); bottom: -100px; right: -100px; animation-delay: -4s; }
  @keyframes floatGlow { from { transform: translate(0,0); } to { transform: translate(30px,20px); } }

  .card {
    position: relative; z-index: 1; width: min(420px, 96vw);
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 2.5rem 2rem;
    box-shadow: 0 0 0 1px rgba(232,197,71,.06), 0 32px 64px rgba(0,0,0,.5);
    animation: fadeUp .5s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

  .logo { display: flex; align-items: center; gap: .6rem; margin-bottom: 1.8rem; }
  .logo-icon { width:32px; height:32px; background:var(--accent); border-radius:8px; display:grid; place-items:center; }
  .logo-icon svg { width:18px; height:18px; fill:var(--bg); }
  .logo-text { font-size:1.1rem; font-weight:800; letter-spacing:-.5px; }
  .logo-text span { color:var(--accent); }

  /* Status-Badge */
  .status-badge {
    font-family: 'Space Mono', monospace; font-size: .65rem;
    padding: .4rem .7rem; border-radius: var(--radius); margin-bottom: 1rem;
    display: flex; align-items: center; gap: .4rem;
  }
  .status-badge.ok  { background: rgba(77,232,154,.08); border: 1px solid rgba(77,232,154,.2); color: var(--accent2); }
  .status-badge.err { background: rgba(232,77,77,.08);  border: 1px solid rgba(232,77,77,.2);  color: #f08080; }
  .status-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .status-dot.ok  { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .status-dot.err { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }

  .tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--bg); border-radius: var(--radius); padding: 4px;
    margin-bottom: 2rem; border: 1px solid var(--border);
  }
  .tab {
    padding: .55rem; text-align: center;
    font-family: 'Space Mono', monospace; font-size: .78rem;
    cursor: pointer; border-radius: 4px; color: var(--muted);
    transition: all .25s; letter-spacing: .03em; user-select: none;
  }
  .tab.active {
    background: var(--surface); color: var(--accent);
    border: 1px solid rgba(232,197,71,.2); box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }

  .form { display: none; flex-direction: column; gap: 1rem; }
  .form.visible { display: flex; animation: fadeIn .3s ease both; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .field { display: flex; flex-direction: column; gap: .4rem; }
  label { font-family:'Space Mono',monospace; font-size:.72rem; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }

  input {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: 'Space Mono', monospace; font-size: .88rem;
    padding: .75rem 1rem; outline: none; transition: border-color .2s, box-shadow .2s; width: 100%;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,197,71,.1); }

  .strength-bar { height:3px; border-radius:2px; background:var(--border); overflow:hidden; margin-top:4px; }
  .strength-fill { height:100%; width:0; border-radius:2px; transition:width .4s,background .4s; }
  .strength-label { font-family:'Space Mono',monospace; font-size:.68rem; color:var(--muted); margin-top:4px; }

  .msg {
    font-family: 'Space Mono', monospace; font-size: .75rem;
    padding: .65rem .9rem; border-radius: var(--radius);
    display: none; border-left: 3px solid; animation: fadeIn .3s ease;
  }
  .msg.error   { background:rgba(232,77,77,.08);  border-color:var(--danger);  color:#f08080; display:block; }
  .msg.success { background:rgba(77,232,154,.08); border-color:var(--accent2); color:var(--accent2); display:block; }

  .btn {
    margin-top: .5rem; padding: .85rem; background: var(--accent); color: var(--bg);
    border: none; border-radius: var(--radius); font-family: 'Syne', sans-serif;
    font-size: .92rem; font-weight: 700; cursor: pointer; letter-spacing: .02em;
    transition: transform .15s, opacity .2s, box-shadow .2s; position: relative; overflow: hidden;
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,197,71,.25); }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-spinner {
    display:none; width:16px; height:16px;
    border:2px solid rgba(0,0,0,.3); border-top-color:var(--bg);
    border-radius:50%; animation:spin .7s linear infinite;
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  }
  .btn.loading .btn-text { opacity:0; }
  .btn.loading .btn-spinner { display:block; }
  @keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }

  .footer { margin-top:1.5rem; display:flex; align-items:center; gap:.5rem; font-family:'Space Mono',monospace; font-size:.68rem; color:var(--muted); }
  .footer::before, .footer::after { content:''; flex:1; height:1px; background:var(--border); }

  .input-wrap { position: relative; }
  .toggle-pw {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    cursor:pointer; color:var(--muted); font-size:.75rem;
    font-family:'Space Mono',monospace; user-select:none; transition:color .2s;
  }
  .toggle-pw:hover { color: var(--accent); }
  .rate-info { font-family:'Space Mono',monospace; font-size:.68rem; color:var(--muted); text-align:right; margin-top:-.4rem; }
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
    </div>
    <div class="logo-text">Secure<span>Auth</span></div>
  </div>

  <!-- Verbindungsstatus -->
  <div class="status-badge" id="statusBadge">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Verbinde mit Supabase…</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')" id="tab-login">// login</div>
    <div class="tab" onclick="switchTab('register')" id="tab-register">// register</div>
  </div>

  <!-- LOGIN -->
  <form id="loginForm" class="form visible" novalidate>
    <div class="msg" id="loginMsg"></div>
    <div class="field">
      <label for="loginEmail">E-Mail</label>
      <input type="email" id="loginEmail" placeholder="user@example.com" autocomplete="email" maxlength="254">
    </div>
    <div class="field">
      <label for="loginPass">Passwort</label>
      <div class="input-wrap">
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" maxlength="128">
        <span class="toggle-pw" onclick="togglePw('loginPass',this)">show</span>
      </div>
    </div>
    <div class="rate-info" id="loginRateInfo"></div>
    <button type="submit" class="btn" id="loginBtn">
      <span class="btn-text">Einloggen</span>
      <span class="btn-spinner"></span>
    </button>
  </form>

  <!-- REGISTER -->
  <form id="registerForm" class="form" novalidate>
    <div class="msg" id="registerMsg"></div>
    <div class="field">
      <label for="regName">Benutzername</label>
      <input type="text" id="regName" placeholder="max_mustermann" autocomplete="username" maxlength="30">
    </div>
    <div class="field">
      <label for="regEmail">E-Mail</label>
      <input type="email" id="regEmail" placeholder="user@example.com" autocomplete="email" maxlength="254">
    </div>
    <div class="field">
      <label for="regPass">Passwort</label>
      <div class="input-wrap">
        <input type="password" id="regPass" placeholder="Min. 12 Zeichen" autocomplete="new-password" maxlength="128">
        <span class="toggle-pw" onclick="togglePw('regPass',this)">show</span>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel">Gib ein Passwort ein</div>
    </div>
    <div class="field">
      <label for="regPassConfirm">Passwort wiederholen</label>
      <input type="password" id="regPassConfirm" placeholder="••••••••" autocomplete="new-password" maxlength="128">
    </div>
    <div class="rate-info" id="registerRateInfo"></div>
    <button type="submit" class="btn" id="registerBtn">
      <span class="btn-text">Konto erstellen</span>
      <span class="btn-spinner"></span>
    </button>
  </form>

  <div class="footer">secured by supabase</div>
</div>

<!-- ════════════════════════════════════════════════════════ -->
<!--  WICHTIG: Supabase SDK laden                            -->
<!-- ════════════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════
//  ▼▼▼  NUR HIER ANPASSEN  ▼▼▼
// ════════════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://ooetpiwjoxqxsfqakxdj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vZXRwaXdqb3hxeHNmcWFreGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcxNzYsImV4cCI6MjA5MjA3MzE3Nn0.nUm3UVs0qYlI5ionBX3EYlpkyecGvDoGu0KVYkUasp0';
// ════════════════════════════════════════════════════════════

// ── Supabase initialisieren ──────────────────────────────
let sb = null;
const badge   = document.getElementById('statusBadge');
const dot     = document.getElementById('statusDot');
const stText  = document.getElementById('statusText');

try {
  if (!SUPABASE_ANON.startsWith('eyJ')) {
    throw new Error('Key nicht eingetragen — bitte eyJ... Key einfügen');
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  badge.className = 'status-badge ok';
  dot.className   = 'status-dot ok';
  stText.textContent = 'Supabase verbunden ✓';
} catch (e) {
  badge.className = 'status-badge err';
  dot.className   = 'status-dot err';
  stText.textContent = '⚠ ' + e.message;
}

// ── Rate Limiter ─────────────────────────────────────────
const rl = {
  data: {}, MAX: 5, WIN: 15 * 60 * 1000,
  check(k) {
    const now = Date.now();
    this.data[k] = (this.data[k] || []).filter(t => now - t < this.WIN);
    if (this.data[k].length >= this.MAX) {
      const w = Math.ceil((this.WIN - (now - this.data[k][0])) / 60000);
      return { ok: false, msg: `Zu viele Versuche. Warte ${w} Min.` };
    }
    return { ok: true, left: this.MAX - this.data[k].length };
  },
  record(k) { (this.data[k] = this.data[k] || []).push(Date.now()); }
};

// ── Validierung ──────────────────────────────────────────
const val = {
  email(v) {
    if (!v) return 'E-Mail ist erforderlich';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v)) return 'Ungültige E-Mail';
    return null;
  },
  username(v) {
    if (!v) return 'Benutzername erforderlich';
    if (!/^[a-z0-9_]{3,30}$/.test(v)) return 'Nur a-z, 0-9, _ · 3–30 Zeichen';
    return null;
  },
  password(v) {
    if (!v)          return 'Passwort erforderlich';
    if (v.length<12) return 'Mindestens 12 Zeichen';
    if (!/[A-Z]/.test(v)) return 'Mindestens ein Großbuchstabe';
    if (!/[a-z]/.test(v)) return 'Mindestens ein Kleinbuchstabe';
    if (!/[0-9]/.test(v)) return 'Mindestens eine Zahl';
    if (!/[^A-Za-z0-9]/.test(v)) return 'Mindestens ein Sonderzeichen (!@#…)';
    return null;
  }
};

// ── UI Helfer ────────────────────────────────────────────
function msg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}
function loading(btnId, on) {
  const b = document.getElementById(btnId);
  b.classList.toggle('loading', on);
  b.disabled = on;
}
function switchTab(tab) {
  ['login','register'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById(t+'Form').classList.toggle('visible', t===tab);
  });
}
function togglePw(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? 'show' : 'hide';
}

// ── Passwort-Stärke ──────────────────────────────────────
document.getElementById('regPass').addEventListener('input', function() {
  const pw = this.value;
  let s = 0;
  if (pw.length>=8)  s++;
  if (pw.length>=12) s++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  const colors = ['#e84d4d','#e87b4d','#e8c547','#a0e84d','#4de89a'];
  const labels = ['Sehr schwach','Schwach','Mittel','Stark','Sehr stark'];
  document.getElementById('strengthFill').style.cssText = `width:${s*20}%;background:${colors[s-1]||'#1e2535'}`;
  const l = document.getElementById('strengthLabel');
  l.textContent = s ? labels[s-1] : 'Gib ein Passwort ein';
  l.style.color = colors[s-1] || 'var(--muted)';
});

// ════════════════════════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════════════════════════
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  msg('loginMsg', '', '');

  if (!sb) { msg('loginMsg', '⚠ Supabase nicht verbunden — Key eintragen!', 'error'); return; }

  const r = rl.check('login');
  if (!r.ok) { msg('loginMsg', r.msg, 'error'); return; }

  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;

  const eErr = val.email(email);
  if (eErr) { msg('loginMsg', eErr, 'error'); return; }
  if (!pass) { msg('loginMsg', 'Passwort eingeben', 'error'); return; }

  loading('loginBtn', true);
  rl.record('login');

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    msg('loginMsg', `✓ Willkommen, ${data.user.email}!`, 'success');
  } catch (err) {
    // Gleiche Meldung für falsche E-Mail und falsches Passwort (Security)
    msg('loginMsg', 'Ungültige Zugangsdaten.', 'error');
    console.error('[Login]', err.message);
  } finally {
    loading('loginBtn', false);
    const left = rl.check('login').left ?? 0;
    document.getElementById('loginRateInfo').textContent = left + ' Versuche verbleibend';
  }
});

// ════════════════════════════════════════════════════════════
//  REGISTRIERUNG
// ════════════════════════════════════════════════════════════
document.getElementById('registerForm').addEventListener('submit', async e => {
  e.preventDefault();
  msg('registerMsg', '', '');

  if (!sb) { msg('registerMsg', '⚠ Supabase nicht verbunden — Key eintragen!', 'error'); return; }

  const r = rl.check('register');
  if (!r.ok) { msg('registerMsg', r.msg, 'error'); return; }

  const name    = document.getElementById('regName').value.trim();
  const email   = document.getElementById('regEmail').value.trim();
  const pass    = document.getElementById('regPass').value;
  const confirm = document.getElementById('regPassConfirm').value;

  const nErr = val.username(name);  if (nErr) { msg('registerMsg', nErr, 'error'); return; }
  const eErr = val.email(email);    if (eErr) { msg('registerMsg', eErr, 'error'); return; }
  const pErr = val.password(pass);  if (pErr) { msg('registerMsg', pErr, 'error'); return; }
  if (pass !== confirm) { msg('registerMsg', 'Passwörter stimmen nicht überein', 'error'); return; }

  loading('registerBtn', true);
  rl.record('register');

  try {
    const { data, error } = await sb.auth.signUp({
      email,
      password: pass,
      options: { data: { username: name } }
    });
    if (error) throw error;
    msg('registerMsg', '✓ Konto erstellt! Bitte E-Mail bestätigen.', 'success');
  } catch (err) {
    msg('registerMsg', err.message || 'Fehler bei der Registrierung', 'error');
    console.error('[Register]', err.message);
  } finally {
    loading('registerBtn', false);
  }
});
</script>
</body>
</html>
